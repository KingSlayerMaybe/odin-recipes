        <h2>Description</h2>
        <p>A warm, energizing drink brewed from roasted coffee beans.</p>

        <h2>Ingredients</h2>
        <ul>
            <li>Coffee powder</li>
            <li>Hot water</li>
            <li>Milk</li>
            <li>Sugar</li>
